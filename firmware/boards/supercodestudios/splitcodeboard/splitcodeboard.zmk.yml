file_format: "1"
id: splitcodeboard
name: SplitCodeBoard
type: board
arch: arm

# Set this to a URL that documents the keyboard.
url: https://example.com

# Add any features your keyboard supports here.
# See https://zmk.dev/docs/development/hardware-integration/hardware-metadata-files#features
features:
  - keys
  - studio  # Remove this line if your keyboard will not support ZMK Studio

outputs:
  - ble

siblings:
  - splitcodeboard_left
  - splitcodeboard_right
  - splitcodeboard_macropad
# If your board has multiple revisions in its board.yml, create a matching list here:
# revisions:
#   - 2.0.0
#   - 1.0.0
# default_revision: 2.0.0
